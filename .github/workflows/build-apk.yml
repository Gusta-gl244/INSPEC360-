name: Build INSPEC360 APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: inspec360-release-apk
        path: app/build/outputs/apk/release/

    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/app-release-unsigned.apk
        tag_name: v1.0.0
        body: |
          🎉 INSPEC360 APK gerado com sucesso!
          
          **Como usar:**
          1. Baixe `app-release-unsigned.apk`
          2. Envie para seu site de testes (Appetize.io)
          3. Ou instale em tablet: `adb install -r app-release-unsigned.apk`
          
          **Credenciais teste:**
          - Usuário: `inspetor1`
          - Senha: `senha123`
